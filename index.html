<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teknicien</title>
<style>
  :root{
    --charcoal-0: #0c0c0d;
    --orange: #E44A26;
    --orange-glow: rgba(228,74,38,0.5);
    --cream: #F5F1EA;
    --cream-dim: #B9B4A9;
    --line: rgba(245,241,234,0.12);
    --font-body: 'Montserrat', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--charcoal-0);
    color:var(--cream);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    overflow:hidden;
    padding:24px;
  }
  body::before{
    content:'';
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(600px 500px at 50% 20%, rgba(228,74,38,0.20), transparent 60%),
      radial-gradient(500px 400px at 15% 85%, rgba(201,162,39,0.10), transparent 60%),
      radial-gradient(500px 400px at 85% 85%, rgba(228,74,38,0.10), transparent 60%);
  }
  .card{
    position:relative; z-index:1;
    text-align:center;
    max-width:480px;
  }
  .logo-mark{
    width:88px; height:88px; border-radius:22px;
    background:#FF0000;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 30px;
    box-shadow:0 0 55px rgba(255,0,0,0.45);
  }
  .logo-mark img{ width:46px; height:auto; }
  .wordmark{
    display:block;
    width:min(240px, 60vw);
    height:auto;
    margin:0 auto 16px;
  }
  .status{
    font-family:var(--font-body); font-weight:500;
    font-size:16px; color:var(--cream-dim);
    margin:0 0 40px;
  }
  .stores{
    display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
  }
  .store-badge{
    display:flex; align-items:center; gap:10px;
    border:1px solid var(--line); border-radius:12px;
    padding:10px 18px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(10px);
    font-size:13px; color:var(--cream-dim);
  }
  .store-badge svg{width:20px; height:20px; flex-shrink:0;}
  .store-badge b{display:block; color:var(--cream); font-size:13px; font-weight:600;}
  .store-badge span{font-size:11px;}
  .dot{
    width:6px; height:6px; border-radius:50%; background:var(--orange);
    display:inline-block; margin-right:7px;
    animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @media (prefers-reduced-motion: reduce){ .dot{animation:none;} }
</style>
</head>
